- clean: ["~"]

- link:
    ~/.config/composer/composer.json: composer/composer.json
    ~/.config/composer/composer.lock: composer/composer.lock
    ~/.config/kitty/kitty.conf: kitty/kitty.conf
    ~/.config/kitty/kitty-themes: kitty/kitty-themes
    ~/.config/kitty/change_kitty_theme.sh: kitty/change_kitty_theme.sh
    ~/.config/nvim: lazyvim
    ~/.gitconfig: git/gitconfig
    ~/.gitignore: git/gitignore
    ~/.tmux.conf: tmux/tmux.conf
    ~/.zimrc: zimrc
    ~/.zshrc: zshrc
    ~/.local/share/gnome-shell/extensions: ubuntu/gnome-shell-extensions
